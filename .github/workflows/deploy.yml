 name: Deploy to IONOS

  on:
    push:
      branches:
        - main

  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20

        - name: Install dependencies
          run: npm install

        - name: Build
          run: npm run build

        - name: Deploy via SFTP
          run: |
            sudo apt-get install -y lftp
            lftp -e "set sftp:auto-confirm yes; mirror -R ./dist/ /; quit" sftp://${{ secrets.SFTP_USER }}:${{
  secrets.SFTP_PASS }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_PORT }}
